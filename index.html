<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes horaires</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="app.js"></script>
  </head>
  <body data-page="badgeage">
    <div class="app">
      <header class="topbar">
        <img src="assets/ntn-logo.png" alt="NTN Europe" />

        <div class="date-actions">
          <input id="work-date" type="date" aria-label="Journée" />
          <button id="today-button" type="button" class="ghost-button">Aujourd'hui</button>
        </div>
      </header>

      <nav class="main-menu" aria-label="Menu principal">
        <a class="menu-button active" href="index.html" data-page-link="badgeage">Badgeage</a>
        <a class="menu-button" href="notes.html" data-page-link="notes">Notes</a>
        <a class="menu-button" href="liens.html" data-page-link="links">Liens</a>
        <a class="menu-button" href="historique.html" data-page-link="history">Historique</a>
      </nav>

      <main id="badgeage-view" class="day-layout">
        <section class="clock-panel" aria-live="polite">
          <span class="label">Maintenant</span>
          <strong id="live-clock">--:--</strong>
          <p class="next-line">Prochain badge: <strong id="next-punch">Arrivée</strong></p>
          <button id="quick-punch" class="primary-button" type="button">Badger maintenant</button>
        </section>

        <section class="target-panel">
          <div>
            <span class="label">Départ conseillé</span>
            <strong id="target-time">--:--</strong>
          </div>

          <div class="target-edit">
            <label class="label" for="target-hours">À faire</label>
            <div class="target-input">
              <input id="target-hours" type="number" min="0" max="24" step="1" inputmode="numeric" disabled />
              <span>h</span>
              <input id="target-minutes" type="number" min="0" max="59" step="5" inputmode="numeric" disabled />
              <span>min</span>
              <button id="target-lock" class="lock-button" type="button">Modifier</button>
            </div>
          </div>

          <div class="progress-shell" aria-label="Progression vers l'objectif du jour">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </section>

        <section class="punch-panel" aria-label="Heures de la journée">
          <div class="punch-row" data-field-row="arrival">
            <label for="arrival">Arrivée</label>
            <input id="arrival" data-field="arrival" type="time" />
            <button type="button" class="secondary-button" data-punch="arrival">Maintenant</button>
          </div>

          <div class="punch-row" data-field-row="lunchOut">
            <label for="lunchOut">Départ repas</label>
            <input id="lunchOut" data-field="lunchOut" type="time" />
            <button type="button" class="secondary-button" data-punch="lunchOut">Maintenant</button>
          </div>

          <div class="punch-row" data-field-row="lunchIn">
            <label for="lunchIn">Retour repas</label>
            <input id="lunchIn" data-field="lunchIn" type="time" />
            <button type="button" class="secondary-button" data-punch="lunchIn">Maintenant</button>
          </div>

          <div class="punch-row" data-field-row="departure">
            <label for="departure">Départ boulot</label>
            <input id="departure" data-field="departure" type="time" />
            <button type="button" class="secondary-button" data-punch="departure">Maintenant</button>
          </div>
        </section>

        <section class="status-panel">
          <div class="summary-row" aria-label="Résumé de la journée">
            <div>
              <span class="label">Travaillé</span>
              <strong id="worked-time">0h00</strong>
            </div>
            <div>
              <span class="label">Restant</span>
              <strong id="remaining-time">8h00</strong>
            </div>
            <div>
              <span class="label">Pause</span>
              <strong id="lunch-time">--</strong>
            </div>
          </div>

          <p id="status-message" class="status-message">Chargement Supabase...</p>

          <div class="panel-actions">
            <button id="undo-button" type="button" class="ghost-button">Annuler</button>
            <button id="clear-button" type="button" class="danger-button">Effacer la journée</button>
          </div>
        </section>
      </main>

    </div>
  </body>
</html>
